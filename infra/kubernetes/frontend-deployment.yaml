apiVersion: v1
kind: Service
metadata:
  name: food-frontend
spec:
  selector:
    app: food-frontend
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: food-frontend

  template:

    metadata:
      labels:
        app: food-frontend

    spec:

      containers:

      - name: frontend

        image: food-frontend:latest

        ports:
        - containerPort: 3000