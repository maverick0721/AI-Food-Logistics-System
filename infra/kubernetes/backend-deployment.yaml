apiVersion: v1
kind: Service
metadata:
  name: food-backend
spec:
  selector:
    app: food-backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: food-backend

  template:

    metadata:
      labels:
        app: food-backend

    spec:

      containers:

      - name: backend

        image: food-backend:latest

        ports:
        - containerPort: 8000