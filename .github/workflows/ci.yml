name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-backend-${{ hashFiles('requirements.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-backend-

      - name: Install backend test dependencies
        run: pip install pytest pyyaml fastapi sqlalchemy kafka-python httpx

      - name: Run backend tests
        run: pytest

      - name: Backend import sweep
        run: |
          python - <<'PY'
          import importlib, pkgutil

          packages = ["backend", "backend.routers", "backend.services", "backend.streaming"]
          failed = []
          checked = 0

          for pkg_name in packages:
            pkg = importlib.import_module(pkg_name)
            paths = getattr(pkg, "__path__", None)
            if not paths:
              checked += 1
              continue
            for m in pkgutil.walk_packages(paths, prefix=pkg.__name__ + "."):
              checked += 1
              try:
                importlib.import_module(m.name)
              except Exception as exc:
                failed.append((m.name, repr(exc)))

          print("checked", checked)
          if failed:
            for name, err in failed:
              print(name, "=>", err)
            raise SystemExit(1)
          PY

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests
        run: CI=true npm test -- --watchAll=false
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend